buildscript {
    ext.kotlinVersion = '1.3.50'
    repositories {
        google()
        jcenter()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:3.5.3'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

allprojects {
    repositories {
        mavenCentral()
        maven { url 'https://jitpack.io' }
        google()
        jcenter()
    }
}

ext {
    applicationId = 'com.nitrosoft.ua.advancedandroid'
    versionName = '1.0.0'
    versionCode = 1
    compileSdkVersion = 29
    buildToolsVersion = '29.0.0'
    minSdkVersion = 21
    targetSdkVersion = 29

    androidxVersion = '1.2.0-beta02'
    archComponentVersion = '2.2.1'
    cardViewVersion = '1.0.0'
    coroutineVersion = '1.3.2'
    ktxVersion = '1.1.0'
    lifecycleVersion = '2.1.0'
    lifecycleLivedataVersion = '2.2.0-rc02'
    materialVersion = '1.2.0-alpha01'
    recylerViewVersion = '1.1.0-rc01'

    daggerVersion = '2.25.2'
    glideVersion = '4.10.0'
    kotshiVersion = '2.0.2'
    moshiVersion = '1.6.0'
    okhttpVersion = '4.2.2'
    retrofitVersion = '2.6.2'
    rxAndroidVersion = '2.1.1'
    rxBindingsVersion = '2.2.0'
    rxJavaVersion = '2.2.14'
    rxRelayVersion = '2.1.1'
    stethoVersion = '1.5.1'
    timberVersion = '4.7.1'
    treeTenAppVersion = '1.2.1'

    junitVersion = 4.12
    mockitoVersion = '3.1.0'
    testCoreVersion = '1.2.0'
    testRunnerVersion = '1.3.0-alpha02'
    testRulesVersion = '1.3.0-alpha02'
    espressoVersion = '3.3.0-alpha02'
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
